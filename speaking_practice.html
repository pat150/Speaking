<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speaking Practice</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap');

  :root {
    --bg: #fdf8f0;
    --card: #ffffff;
    --navy: #1a2e4a;
    --gold: #e8a020;
    --gold-light: #fef3dc;
    --green: #2d7a4f;
    --green-light: #eaf6ef;
    --red: #c0392b;
    --red-light: #fdecea;
    --text: #2c3e50;
    --muted: #7f8c8d;
    --border: #e8e0d0;
    --shadow: 0 4px 24px rgba(26,46,74,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  header h1 {
    font-family: 'Lora', serif;
    font-size: 2rem;
    color: var(--navy);
    margin-bottom: 4px;
  }

  header p {
    color: var(--muted);
    font-size: 0.95rem;
  }

  .progress-bar-wrap {
    background: var(--border);
    border-radius: 99px;
    height: 8px;
    max-width: 500px;
    margin: 0 auto 32px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), #f0c040);
    border-radius: 99px;
    transition: width 0.5s ease;
  }

  .card {
    background: var(--card);
    border-radius: 20px;
    box-shadow: var(--shadow);
    max-width: 640px;
    margin: 0 auto 24px;
    padding: 32px 28px;
    border: 1.5px solid var(--border);
  }

  .q-label {
    font-size: 0.78rem;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .question-text {
    font-family: 'Lora', serif;
    font-size: 1.35rem;
    color: var(--navy);
    line-height: 1.5;
    margin-bottom: 28px;
  }

  .mic-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 16px 28px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    transition: background 0.2s, transform 0.1s;
    margin-bottom: 12px;
  }

  .mic-btn:hover { background: #253d5f; }
  .mic-btn:active { transform: scale(0.98); }

  .mic-btn.recording {
    background: var(--red);
    animation: pulse 1.2s infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(192,57,43,0.3); }
    50% { box-shadow: 0 0 0 10px rgba(192,57,43,0); }
  }

  .mic-icon { font-size: 1.3rem; }

  .transcript-box {
    background: #f7f3ee;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 0.95rem;
    color: var(--text);
    min-height: 52px;
    line-height: 1.6;
    border: 1.5px solid var(--border);
    margin-bottom: 16px;
    font-style: italic;
    display: none;
  }

  .transcript-box.visible { display: block; }

  .transcript-label {
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .feedback-box {
    border-radius: 12px;
    padding: 16px 18px;
    font-size: 0.95rem;
    line-height: 1.7;
    display: none;
    margin-bottom: 16px;
  }

  .feedback-box.good {
    background: var(--green-light);
    border: 1.5px solid #a8d5b8;
    display: block;
  }

  .feedback-box.errors {
    background: var(--gold-light);
    border: 1.5px solid #f0c875;
    display: block;
  }

  .feedback-label {
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .next-btn {
    background: var(--gold);
    color: var(--navy);
    border: none;
    border-radius: 12px;
    padding: 13px 24px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-weight: 800;
    cursor: pointer;
    width: 100%;
    transition: background 0.2s;
    display: none;
  }

  .next-btn:hover { background: #d4910d; }
  .next-btn.visible { display: block; }

  .loading-dots {
    display: inline-flex;
    gap: 4px;
    align-items: center;
  }

  .loading-dots span {
    width: 7px; height: 7px;
    background: var(--gold);
    border-radius: 50%;
    animation: bounce 1s infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  /* Summary */
  #summary {
    display: none;
    max-width: 640px;
    margin: 0 auto;
  }

  #summary h2 {
    font-family: 'Lora', serif;
    font-size: 1.6rem;
    color: var(--navy);
    text-align: center;
    margin-bottom: 24px;
  }

  .summary-item {
    background: var(--card);
    border-radius: 16px;
    border: 1.5px solid var(--border);
    padding: 20px 22px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(26,46,74,0.06);
  }

  .summary-q {
    font-family: 'Lora', serif;
    font-size: 1rem;
    color: var(--navy);
    margin-bottom: 8px;
    font-style: italic;
  }

  .summary-said {
    font-size: 0.88rem;
    color: var(--muted);
    margin-bottom: 10px;
    padding-left: 10px;
    border-left: 3px solid var(--border);
  }

  .summary-feedback {
    font-size: 0.9rem;
    line-height: 1.6;
    color: var(--text);
  }

  .copy-btn {
    display: block;
    margin: 24px auto 0;
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 13px 28px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }

  .copy-btn:hover { background: #253d5f; }

  .status-hint {
    text-align: center;
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 8px;
    min-height: 20px;
  }

  #main-card { display: block; }

  .badge {
    display: inline-block;
    background: var(--green-light);
    color: var(--green);
    border-radius: 99px;
    font-size: 0.75rem;
    font-weight: 800;
    padding: 3px 10px;
    margin-left: 8px;
    vertical-align: middle;
  }
</style>
</head>
<body>

<header>
  <h1>Speaking Practice 🎙️</h1>
  <p>Listen to the question, then speak your answer</p>
</header>

<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
</div>

<div id="main-card" class="card">
  <div class="q-label" id="qLabel">Question 1 of 5</div>
  <div class="question-text" id="questionText">Loading...</div>

  <button class="mic-btn" id="micBtn" onclick="toggleRecording()">
    <span class="mic-icon">🎤</span>
    <span id="micLabel">Tap to speak</span>
  </button>
  <div class="status-hint" id="statusHint"></div>

  <div id="transcriptWrap" style="margin-top:16px; display:none;">
    <div class="transcript-label">What I heard</div>
    <div class="transcript-box visible" id="transcriptBox"></div>
  </div>

  <div id="feedbackWrap" style="display:none; margin-top:4px;">
    <div class="feedback-label">Feedback</div>
    <div class="feedback-box" id="feedbackBox"></div>
  </div>

  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next question →</button>
</div>

<div id="summary">
  <h2>Session complete! 🎉</h2>
  <div id="summaryItems"></div>
  <button class="copy-btn" onclick="copyTranscript()">📋 Copy full transcript</button>
</div>

<script>
const QUESTIONS = [
  "Tell me what you did last Friday.",
  "What do you usually have for breakfast?",
  "Describe your bedroom.",
  "Tell me about your best friend.",
  "What did you watch on TV or online recently?"
];

let currentQ = 0;
let recognition = null;
let isRecording = false;
let sessionLog = [];

function init() {
  showQuestion();
}

function showQuestion() {
  document.getElementById('qLabel').textContent = `Question ${currentQ + 1} of ${QUESTIONS.length}`;
  document.getElementById('questionText').textContent = QUESTIONS[currentQ];
  document.getElementById('progressBar').style.width = `${(currentQ / QUESTIONS.length) * 100}%`;

  document.getElementById('transcriptWrap').style.display = 'none';
  document.getElementById('feedbackWrap').style.display = 'none';
  document.getElementById('transcriptBox').textContent = '';
  document.getElementById('feedbackBox').textContent = '';
  document.getElementById('feedbackBox').className = 'feedback-box';
  document.getElementById('nextBtn').className = 'next-btn';
  document.getElementById('statusHint').textContent = '';
  document.getElementById('micBtn').className = 'mic-btn';
  document.getElementById('micLabel').textContent = 'Tap to speak';
  document.getElementById('micBtn').disabled = false;
}

function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
}

function startRecording() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Sorry, your browser does not support speech recognition. Please use Chrome or Edge.');
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'en-GB';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('micBtn').className = 'mic-btn recording';
    document.getElementById('micLabel').textContent = 'Listening... tap to stop';
    document.getElementById('statusHint').textContent = 'Speak clearly into your microphone';
  };

  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    showTranscript(transcript);
    getAIFeedback(transcript);
  };

  recognition.onerror = (e) => {
    isRecording = false;
    document.getElementById('micBtn').className = 'mic-btn';
    document.getElementById('micLabel').textContent = 'Tap to speak';
    document.getElementById('statusHint').textContent = 'Could not hear anything — try again';
  };

  recognition.onend = () => {
    isRecording = false;
    document.getElementById('micBtn').className = 'mic-btn';
    document.getElementById('micLabel').textContent = 'Tap to speak again';
  };

  recognition.start();
}

function stopRecording() {
  if (recognition) recognition.stop();
}

function showTranscript(text) {
  document.getElementById('transcriptBox').textContent = `"${text}"`;
  document.getElementById('transcriptWrap').style.display = 'block';
  document.getElementById('micBtn').disabled = true;
  document.getElementById('statusHint').textContent = '';

  // Show loading
  document.getElementById('feedbackWrap').style.display = 'block';
  document.getElementById('feedbackBox').className = 'feedback-box errors';
  document.getElementById('feedbackBox').innerHTML = `
    <span style="color:var(--muted); font-size:0.9rem;">Checking your answer </span>
    <span class="loading-dots"><span></span><span></span><span></span></span>
  `;
}

async function getAIFeedback(transcript) {
  const question = QUESTIONS[currentQ];

  const prompt = `You are a friendly English teacher helping a B1-level student practise speaking English. 

The student was asked: "${question}"
The student said: "${transcript}"

Please do the following:
1. Check for grammar errors, especially tense errors, verb agreement, missing articles, and word order.
2. Give brief, warm, encouraging feedback in 2-4 sentences.
3. If there are errors, show the corrected version clearly.
4. If the answer is correct, praise them briefly and note what they did well.
5. Keep your language simple and friendly — this is for a younger learner.

Do NOT use bullet points or lists. Write in a natural, conversational tone as a teacher would speak.`;

  const GROK_API_KEY = "xai-UB7IKkfnW7he83aqWKiphocobdDYES6KrL4FA8GIadYCx9yMlAhvf2PV2NyMeLFFoTAmeYe7FdrskziT";

  try {
    const response = await fetch("https://api.x.ai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${GROK_API_KEY}`
      },
      body: JSON.stringify({
        model: "grok-3-mini",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    const feedback = data.choices[0].message.content;


    // Determine if there were errors (simple heuristic)
    const hasErrors = /correct|should be|instead of|mistake|error|try saying|it should/i.test(feedback);

    document.getElementById('feedbackBox').className = `feedback-box ${hasErrors ? 'errors' : 'good'}`;
    document.getElementById('feedbackBox').textContent = feedback;

    // Log for summary
    sessionLog.push({
      question,
      said: transcript,
      feedback
    });

    document.getElementById('nextBtn').className = 'next-btn visible';

  } catch (err) {
    document.getElementById('feedbackBox').className = 'feedback-box errors';
    document.getElementById('feedbackBox').textContent = 'Sorry, could not get feedback right now. Please try again.';
    document.getElementById('micBtn').disabled = false;
  }
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= QUESTIONS.length) {
    showSummary();
  } else {
    showQuestion();
  }
}

function showSummary() {
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('main-card').style.display = 'none';
  document.getElementById('summary').style.display = 'block';

  const container = document.getElementById('summaryItems');
  container.innerHTML = '';

  sessionLog.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'summary-item';
    div.innerHTML = `
      <div class="summary-q">Q${i+1}: ${item.question}</div>
      <div class="summary-said">"${item.said}"</div>
      <div class="summary-feedback">${item.feedback}</div>
    `;
    container.appendChild(div);
  });
}

function copyTranscript() {
  let text = 'SPEAKING PRACTICE SESSION\n\n';
  sessionLog.forEach((item, i) => {
    text += `Q${i+1}: ${item.question}\n`;
    text += `Student said: "${item.said}"\n`;
    text += `Feedback: ${item.feedback}\n\n`;
  });

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✅ Copied!';
    setTimeout(() => btn.textContent = '📋 Copy full transcript', 2000);
  });
}

init();
</script>
</body>
</html>
